{% extends "base.html" %}

{% block title %}My Groups{% endblock %}

{% block content %}
<h2>My Groups</h2>

<a href="{% url 'group_add' %}">+ Create Group</a>

<ul>
    {% for group in groups %}
        <li>
            <a href="{% url 'group_detail' group.id %}">
                {{ group.name }}
            </a>
        </li>
    {% empty %}
        <li>No groups yet.</li>
    {% endfor %}
</ul>
{% endblock %}
