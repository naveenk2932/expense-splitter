{% extends "base.html" %}

{% block title %}Expense{% endblock %}

{% block content %}
<h2>{% if expense %}Edit Expense{% else %}Add Expense{% endif %}</h2>

<form method="post">
    {% csrf_token %}

    <input type="text"
           name="title"
           placeholder="Expense title"
           value="{{ expense.title|default:'' }}"
           required>

    <input type="number"
           step="0.01"
           name="amount"
           value="{{ expense.amount|default:'' }}"
           placeholder="Amount"
           required>

    <select name="paid_by" required>
        {% for member in members %}
            <option value="{{ member.id }}"
                {% if expense and expense.paid_by.id == member.id %}selected{% endif %}>
                {{ member.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Save</button>
</form>

{% if expense %}
    <a href="{% url 'group_detail' expense.group.id %}">Back</a>
{% else %}
    <a href="{% url 'group_detail' group.id %}">Back</a>
{% endif %}

{% endblock %}
